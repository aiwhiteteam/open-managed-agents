services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_managed_agents
      POSTGRES_USER: open_managed_agents
      POSTGRES_PASSWORD: open_managed_agents
    volumes:
      - open-managed-agents-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_managed_agents -d open_managed_agents"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: open_managed_agents
      MINIO_ROOT_PASSWORD: open_managed_agents_secret
    volumes:
      - open-managed-agents-objects:/data
    ports:
      - "9100:9000"
      - "9101:9001"

  object-storage-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "until mc alias set local http://object-storage:9000 open_managed_agents open_managed_agents_secret; do sleep 1; done &&
      mc mb --ignore-existing local/open-managed-agents"
    depends_on:
      - object-storage

  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: scripts/migrate.sh
    environment:
      DATABASE_URL: postgresql+asyncpg://open_managed_agents:open_managed_agents@db:5432/open_managed_agents
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: scripts/start-web.sh
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://open_managed_agents:open_managed_agents@db:5432/open_managed_agents
      OMA_RUNTIME_BACKEND: local
      OMA_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://object-storage:9000
      S3_ACCESS_KEY_ID: open_managed_agents
      S3_SECRET_ACCESS_KEY: open_managed_agents_secret
      S3_BUCKET_NAME: open-managed-agents
      S3_PUBLIC_URL: http://localhost:9100/open-managed-agents
      S3_REGION: us-east-1
      OMA_REQUIRE_BETA_HEADER: "true"
      OMA_REQUIRE_ANTHROPIC_VERSION_HEADER: "true"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: scripts/start-worker.sh
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://open_managed_agents:open_managed_agents@db:5432/open_managed_agents
      OMA_RUNTIME_BACKEND: local
      OMA_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://object-storage:9000
      S3_ACCESS_KEY_ID: open_managed_agents
      S3_SECRET_ACCESS_KEY: open_managed_agents_secret
      S3_BUCKET_NAME: open-managed-agents
      S3_PUBLIC_URL: http://localhost:9100/open-managed-agents
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
    profiles:
      - worker

volumes:
  open-managed-agents-postgres:
  open-managed-agents-objects:
