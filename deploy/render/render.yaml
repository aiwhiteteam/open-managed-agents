services:
  - type: web
    name: open-managed-agents-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: scripts/start-web.sh
    healthCheckPath: /health
    preDeployCommand: scripts/migrate.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: OMA_RUNTIME_BACKEND
        value: auto
      - key: OMA_STORAGE_BACKEND
        value: s3
      - key: DATABASE_URL
        fromDatabase:
          name: open-managed-agents-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OMA_API_KEYS
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_REGION
        value: auto

  - type: worker
    name: open-managed-agents-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: scripts/start-worker.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: OMA_RUNTIME_BACKEND
        value: auto
      - key: OMA_STORAGE_BACKEND
        value: s3
      - key: DATABASE_URL
        fromDatabase:
          name: open-managed-agents-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OMA_API_KEYS
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_REGION
        value: auto

databases:
  - name: open-managed-agents-db
    databaseName: open_managed_agents
    user: open_managed_agents
