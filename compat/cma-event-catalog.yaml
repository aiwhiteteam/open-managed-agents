events:
  user:
    - user.message
    - user.interrupt
    - user.tool_confirmation
    - user.custom_tool_result
  agent:
    - agent.message
    - agent.tool_use
    - agent.tool_result
  session:
    - session.status_running
    - session.status_idle
    - session.status_terminated
    - session.error
    - session.updated
    - session.deleted
  system:
    - system.message
notes:
  - Event payloads are normalized by open-managed-agents and should not expose raw OpenAI SDK stream event objects.
  - Full Claude event union extraction from the generated Anthropic SDK remains a follow-up.

